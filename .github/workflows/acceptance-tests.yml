          steps.workers_extended_tests.outcome == 'failure' ||
          steps.workers_platform_tests.outcome == 'failure' ||
          steps.email_routing_tests.outcome == 'failure' ||
          steps.email_security_tests.outcome == 'failure' ||
          steps.security_core_tests.outcome == 'failure' ||
          steps.security_advanced_tests.outcome == 'failure' ||
          steps.rules_and_policies_tests.outcome == 'failure' ||
          steps.snippets_tests.outcome == 'failure' ||
          steps.tls_and_certificates_tests.outcome == 'failure' ||
          steps.ssl_config_tests.outcome == 'failure' ||
          steps.web_features_tests.outcome == 'failure' ||
          steps.web_monitoring_tests.outcome == 'failure' ||
          steps.waiting_room_tests.outcome == 'failure' ||
          steps.performance_tests.outcome == 'failure' ||
          steps.cdn_advanced_tests.outcome == 'failure' ||
          steps.gateway_and_policies_tests.outcome == 'failure' ||
          steps.dlp_config_tests.outcome == 'failure' ||
          steps.access_core_tests.outcome == 'failure' ||
          steps.access_identity_tests.outcome == 'failure' ||
          steps.access_mtls_tests.outcome == 'failure' ||
          steps.access_applications_tests.outcome == 'failure' ||
          steps.zero_trust_org_tests.outcome == 'failure' ||
          steps.zero_trust_list_tests.outcome == 'failure' ||
          steps.tunnel_cloudflared_tests.outcome == 'failure' ||
          steps.tunnel_devices_tests.outcome == 'failure' ||
          steps.account_core_tests.outcome == 'failure' ||
          steps.account_settings_tests.outcome == 'failure' ||
          steps.r2_storage_tests.outcome == 'failure' ||
          steps.pages_tests.outcome == 'failure' ||
          steps.queue_and_messaging_tests.outcome == 'failure' ||
          steps.general_api_tests.outcome == 'failure' ||
          steps.misc_account_tools_tests.outcome == 'failure' ||
          steps.platform_and_advanced_tests.outcome == 'failure' ||
          steps.default_acceptance_tests.outcome == 'failure'
        }}
        run: exit 1
