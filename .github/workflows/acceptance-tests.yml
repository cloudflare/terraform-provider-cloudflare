          TF_MIGRATE_BINARY_PATH: ${{ github.workspace }}/tf-migrate
        continue-on-error: true

      # Performance test groups
      - name: Run Performance Tests
        id: performance_tests
        run: ./scripts/run-ci-tests performance acceptance
        env:
