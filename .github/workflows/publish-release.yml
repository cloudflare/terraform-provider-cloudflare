---
name: Publish Release

on:
  push:
    tags:
      - "v*"

jobs:
  # Build linux_amd64 only (minimum required for Terraform Registry)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}" -trimpath -o terraform-provider-cloudflare_linux_amd64_${{ github.ref_name }} .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-provider-cloudflare_linux_amd64_${{ github.ref_name }}
          path: terraform-provider-cloudflare_linux_amd64_${{ github.ref_name }}
          retention-days: 1

  # Create release and attach all artifacts
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: terraform-provider-cloudflare_*
          merge-multiple: true
      - name: Prepare artifacts
        run: |
          cd dist
          VERSION="${{ github.ref_name }}"
          VERSION_NOV="${VERSION#v}"
          # Rename files to remove v prefix: terraform-provider-cloudflare_linux_amd64_v1.0.46 -> terraform-provider-cloudflare_linux_amd64_1.0.46
          for f in *; do
            [ -f "$f" ] && mv "$f" "${f//_v${VERSION_NOV}/_${VERSION_NOV}}" 2>/dev/null || true
          done
          ls -la
      - name: Add Terraform Registry manifest
        run: |
          set -e
          VERSION="${{ github.ref_name }}"
          VERSION_NOV="${VERSION#v}"
          # Copy manifest file to dist and rename to expected format
          cp terraform-registry-manifest.json dist/terraform-provider-trafgals-cloudflare_${VERSION_NOV}_manifest.json
          echo "Added manifest file to dist"
      - name: Create Terraform Registry zip package
        run: |
          set -e
          DIST_DIR="$PWD/dist"
          cd "$DIST_DIR"
          VERSION="${{ github.ref_name }}"
          VERSION_NOV="${VERSION#v}"
          
          echo "=== Files in dist ==="
          ls -la
          
          binary="terraform-provider-cloudflare_linux_amd64_${VERSION_NOV}"
          if [ ! -f "$binary" ]; then
            echo "ERROR: $binary not found"
            exit 1
          fi
          
          pkg_dir=$(mktemp -d)
          cp "$binary" "$pkg_dir/terraform-provider-trafgals-cloudflare_v${VERSION_NOV}"
          cd "$pkg_dir"
          zip -r "$DIST_DIR/terraform-provider-trafgals-cloudflare_${VERSION_NOV}_linux_amd64.zip" . -q
          rm -rf "$pkg_dir"
          echo "Created terraform-provider-trafgals-cloudflare_${VERSION_NOV}_linux_amd64.zip"
          rm -f "$binary"
          echo "=== Final zip files ==="
          cd "$DIST_DIR"
          ls -la *.zip
      - name: Generate checksums for Terraform Registry packages
        run: |
          set -e
          cd dist
          VERSION="${{ github.ref_name }}"
          VERSION_NOV="${VERSION#v}"
          sha256sum terraform-provider-trafgals-cloudflare_${VERSION_NOV}_linux_amd64.zip terraform-provider-trafgals-cloudflare_${VERSION_NOV}_manifest.json > terraform-provider-trafgals-cloudflare_${VERSION_NOV}_SHA256SUMS
          cat terraform-provider-trafgals-cloudflare_${VERSION_NOV}_SHA256SUMS
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Sign checksums for Terraform Registry
        run: |
          set -e
          cd dist
          VERSION="${{ github.ref_name }}"
          VERSION_NOV="${VERSION#v}"
          # Sign with .sig extension and key fingerprint for Terraform Registry
          gpg --batch --yes --local-user ${{ steps.import_gpg.outputs.fingerprint }} --armor --detach-sign terraform-provider-trafgals-cloudflare_${VERSION_NOV}_SHA256SUMS
          # Rename to include key ID for Terraform Registry compatibility
          mv terraform-provider-trafgals-cloudflare_${VERSION_NOV}_SHA256SUMS.asc terraform-provider-trafgals-cloudflare_${VERSION_NOV}_SHA256SUMS.sig
          ls -la *.sig *.asc 2>/dev/null || true
      - name: Create GitHub Release
        run: |
          cd dist
          VERSION="${{ github.ref_name }}"
          VERSION_NOV="${VERSION#v}"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --repo trafgals/terraform-provider-cloudflare \
            "terraform-provider-trafgals-cloudflare_${VERSION_NOV}_linux_amd64.zip" \
            "terraform-provider-trafgals-cloudflare_${VERSION_NOV}_SHA256SUMS" \
            "terraform-provider-trafgals-cloudflare_${VERSION_NOV}_SHA256SUMS.sig" \
            "terraform-provider-trafgals-cloudflare_${VERSION_NOV}_manifest.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
