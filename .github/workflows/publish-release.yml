---
name: Publish Release

on:
  push:
    tags:
      - "v*"

jobs:
  # Build each platform on separate runners in parallel
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin_amd64
            os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - platform: darwin_arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - platform: linux_amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - platform: linux_arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}" -trimpath -o terraform-provider-cloudflare_${{ matrix.platform }}_${{ github.ref_name }}${{ matrix.ext }} .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-provider-cloudflare_${{ matrix.platform }}_${{ github.ref_name }}
          path: terraform-provider-cloudflare_${{ matrix.platform }}_${{ github.ref_name }}${{ matrix.ext }}
          retention-days: 1

  # Create release and attach all artifacts
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: terraform-provider-cloudflare_*
          merge-multiple: true
      - name: Prepare artifacts
        run: |
          cd dist
          # Rename without v prefix for checksums
          for f in *; do
            [ -f "$f" ] && mv "$f" "${f//_v/_}" 2>/dev/null || true
          done
          ls -la
      - name: Copy manifest for Terraform Registry packages
        run: cp terraform-registry-manifest.json dist/
      - name: Create Terraform Registry packages
        run: |
          set -e
          cd dist
          VERSION="${{ github.ref_name }}"
          # VERSION is like v1.0.34, files are renamed to remove v (1.0.34)
          VERSION_NOV="${VERSION#v}"
          
          # Create .tgz packages for Terraform Registry
          # Structure: <os>_<arch>/terraform-provider-<namespace>-<name>_v<version>
          for arch in amd64 arm64; do
            for os in darwin linux; do
              binary_name="terraform-provider-cloudflare_${os}_${arch}"
              # Try with v prefix first, then without
              if [ -f "${binary_name}_${VERSION}" ]; then
                binary="${binary_name}_${VERSION}"
              elif [ -f "${binary_name}_${VERSION_NOV}" ]; then
                binary="${binary_name}_${VERSION_NOV}"
              else
                continue
              fi
              os_arch="${os}_${arch}"
              # Create package with proper Terraform Registry structure
              pkg_dir="pkg_$$RANDOM"
              mkdir -p "${pkg_dir}/${os_arch}"
              # Binary must be named terraform-provider-trafgals-cloudflare_v<version>
              cp "${binary}" "${pkg_dir}/${os_arch}/terraform-provider-trafgals-cloudflare_${VERSION}"
              cp terraform-registry-manifest.json "${pkg_dir}/${os_arch}/"
              tar -czf "terraform-provider-trafgals-cloudflare_${VERSION}_${os_arch}.tgz" -C "${pkg_dir}" .
              rm -rf "${pkg_dir}"
              echo "Created terraform-provider-trafgals-cloudflare_${VERSION}_${os_arch}.tgz"
            done
          done
          ls -la *.tgz
      - name: Generate checksums for Terraform Registry packages
        run: |
          cd dist
          # Generate checksums for .tgz files only (for Terraform Registry)
          sha256sum *.tgz > terraform-provider-trafgals-cloudflare_${{ github.ref_name }}_SHA256SUMS
          cat terraform-provider-trafgals-cloudflare_${{ github.ref_name }}_SHA256SUMS
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Sign checksums for Terraform Registry
        run: |
          cd dist
          # Sign with .sig extension and key fingerprint for Terraform Registry
          gpg --batch --yes --local-user ${{ steps.import_gpg.outputs.fingerprint }} --armor --detach-sign terraform-provider-trafgals-cloudflare_${{ github.ref_name }}_SHA256SUMS
          # Rename to include key ID for Terraform Registry compatibility
          mv terraform-provider-trafgals-cloudflare_${{ github.ref_name }}_SHA256SUMS.asc "terraform-provider-trafgals-cloudflare_${{ github.ref_name }}_SHA256SUMS.sig"
          ls -la *.sig *.asc 2>/dev/null || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
