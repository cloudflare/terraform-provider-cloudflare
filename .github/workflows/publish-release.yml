---
name: Publish Release

on:
  push:
    tags:
      - "v*"

jobs:
  # Build each platform on separate runners in parallel
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin_amd64
            os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - platform: darwin_arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - platform: linux_amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - platform: linux_arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}" -trimpath -o terraform-provider-cloudflare_${{ matrix.platform }}_${{ github.ref_name }}${{ matrix.ext }} .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-provider-cloudflare_${{ matrix.platform }}_${{ github.ref_name }}
          path: terraform-provider-cloudflare_${{ matrix.platform }}_${{ github.ref_name }}${{ matrix.ext }}
          retention-days: 1

  # Create release and attach all artifacts
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: terraform-provider-cloudflare_*
          merge-multiple: true
      - name: Prepare artifacts
        run: |
          cd dist
          # Rename without v prefix for checksums
          for f in *; do
            [ -f "$f" ] && mv "$f" "${f//_v/_}" 2>/dev/null || true
          done
          ls -la
      - name: Add Terraform Registry manifest
        run: |
          set -e
          VERSION="${{ github.ref_name }}"
          VERSION_NOV="${VERSION#v}"
          # Copy manifest file to dist and rename to expected format
          cp terraform-registry-manifest.json dist/terraform-provider-trafgals-cloudflare_v${VERSION_NOV}_manifest.json
          echo "Added manifest file to dist"
      - name: Create Terraform Registry zip packages
        run: |
          set -e
          DIST_DIR="$PWD/dist"
          cd "$DIST_DIR"
          VERSION="${{ github.ref_name }}"           # e.g. v1.0.42
          VERSION_NOV="${VERSION#v}"                 # e.g. 1.0.42 (strip leading v)
          
          # Debug: list files in dist
          echo "=== Files in dist ==="
          ls -la
          
          # Create .zip packages for Terraform Registry
          for arch in amd64 arm64; do
            for os in darwin linux; do
              os_arch="${os}_${arch}"
              # Check for files with v prefix first, then without
              binary_with_v="terraform-provider-cloudflare_${os_arch}_${VERSION}"
              binary_no_v="terraform-provider-cloudflare_${os_arch}_${VERSION_NOV}"
              
              echo "=== Checking ${os_arch} ==="
              echo "Looking for: ${binary_with_v} or ${binary_no_v}"
              
              if [ -f "$binary_with_v" ]; then
                binary="$binary_with_v"
                echo "Found (with v): $binary"
              elif [ -f "$binary_no_v" ]; then
                binary="$binary_no_v"
                echo "Found (no v): $binary"
              else
                echo "NOT FOUND, skipping"
                continue
              fi
              
              pkg_dir=$(mktemp -d)
              # Binary inside zip MUST be named terraform-provider-namespace-name_vX.Y.Z for Terraform Registry
              cp "$binary" "$pkg_dir/terraform-provider-trafgals-cloudflare_v${VERSION_NOV}"
              cd "$pkg_dir"
              zip -r "$DIST_DIR/terraform-provider-trafgals-cloudflare_v${VERSION_NOV}_${os_arch}.zip" . -q
              cd /
              rm -rf "$pkg_dir"
              echo "Created terraform-provider-trafgals-cloudflare_v${VERSION_NOV}_${os_arch}.zip"
              # Return to DIST_DIR for next iteration
              cd "$DIST_DIR"
            done
          done
          echo "=== Final zip files ==="
          cd "$DIST_DIR"
          ls -la *.zip
      - name: Generate checksums for Terraform Registry packages
        run: |
          set -e
          cd dist
          VERSION="${{ github.ref_name }}"
          VERSION_NOV="${VERSION#v}"
          # Generate checksums for .zip files (Terraform Registry requirement)
          sha256sum terraform-provider-trafgals-cloudflare_v${VERSION_NOV}_*.zip > terraform-provider-trafgals-cloudflare_v${VERSION_NOV}_SHA256SUMS
          cat terraform-provider-trafgals-cloudflare_v${VERSION_NOV}_SHA256SUMS
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Sign checksums for Terraform Registry
        run: |
          set -e
          cd dist
          VERSION="${{ github.ref_name }}"
          VERSION_NOV="${VERSION#v}"
          # Sign with .sig extension and key fingerprint for Terraform Registry
          gpg --batch --yes --local-user ${{ steps.import_gpg.outputs.fingerprint }} --armor --detach-sign terraform-provider-trafgals-cloudflare_v${VERSION_NOV}_SHA256SUMS
          # Rename to include key ID for Terraform Registry compatibility
          mv terraform-provider-trafgals-cloudflare_v${VERSION_NOV}_SHA256SUMS.asc terraform-provider-trafgals-cloudflare_v${VERSION_NOV}_SHA256SUMS.sig
          ls -la *.sig *.asc 2>/dev/null || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
