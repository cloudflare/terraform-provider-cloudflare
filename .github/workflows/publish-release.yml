---
name: Publish Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Debug
        run: |
          echo "Starting publish release workflow"
          echo "Tag: ${{ github.ref }}"
          df -h /
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Build with GoReleaser (no publish)
        uses: goreleaser/goreleaser-action@v6.0.0
        with:
          version: latest
          args: "build --clean --timeout 3h -p 1"
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check disk space after build
        run: df -h /
      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes ""
      - name: Upload and delete each artifact
        run: |
          shopt -s globstar
          for artifact in dist/**/*; do
            if [ -f "$artifact" ]; then
              echo "Uploading $artifact..."
              gh release upload --clobber ${{ github.ref_name }} "$artifact"
              rm -v "$artifact"
              echo "Deleted $artifact"
              echo "Disk space after deletion:"
              df -h /
            fi
          done
      - name: Verify release assets
        run: gh release view ${{ github.ref_name }} --json assets
      - name: Run registry sync
        run: ./scripts/trigger-terraform-registry-sync
        env:
          TERRAFORM_REGISTRY_COOKIE: ${{ secrets.TERRAFORM_REGISTRY_COOKIE }}
