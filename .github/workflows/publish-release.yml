---
name: Publish Release

on:
  push:
    tags:
      - "v*"

jobs:
  # Build each platform on separate runners in parallel
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin_amd64
            os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - platform: darwin_arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - platform: linux_amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - platform: linux_arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}" -trimpath -o terraform-provider-cloudflare_${{ matrix.platform }}_${{ github.ref_name }}${{ matrix.ext }} .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-provider-cloudflare_${{ matrix.platform }}_${{ github.ref_name }}
          path: terraform-provider-cloudflare_${{ matrix.platform }}_${{ github.ref_name }}${{ matrix.ext }}
          retention-days: 1

  # Create release and attach all artifacts
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: terraform-provider-cloudflare_*
          merge-multiple: true
      - name: Prepare artifacts
        run: |
          cd dist
          # Rename without v prefix for checksums
          for f in *; do
            [ -f "$f" ] && mv "$f" "${f//_v/_}" 2>/dev/null || true
          done
          ls -la
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > terraform-provider-cloudflare_${{ github.ref_name }}_SHA256SUMS
          cat terraform-provider-cloudflare_${{ github.ref_name }}_SHA256SUMS
      - name: Copy manifest
        run: cp terraform-registry-manifest.json dist/
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Sign checksums
        run: |
          cd dist
          gpg --batch --yes --local-user ${{ steps.import_gpg.outputs.fingerprint }} --armor --detach-sign terraform-provider-cloudflare_${{ github.ref_name }}_SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
